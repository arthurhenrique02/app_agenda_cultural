services:
  db:
    image: postgres:16-alpine
    container_name: agenda_db
    env_file:
      - .env
    command: ["-p", "5450"]
    ports:
      - "5450:5450"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agenda_cultural -p 5450"]
      interval: 5s
      timeout: 5s
      retries: 10

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: agenda_seaweedfs
    command: "server -s3 -dir=/data -ip=seaweedfs -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json"
    ports:
      - "8333:8333"
    volumes:
      - seaweedfs_data:/data
      - ./s3.json:/etc/seaweedfs/s3.json:ro

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: agenda_api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run python -m app.seed &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  db_data:
  seaweedfs_data:
